<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f8f8f8;
        }

        .main {
            position: relative;
            height: 100vh;
            width: 200%;
            /* Adjusted width for horizontal scrolling */
            z-index: 1;
            overflow-x: auto;
            /* Change overflow-x to auto for horizontal scrolling */
            overflow-y: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        .phase-box {
            height: 100%;
            width: 30%;
            background-color: #ff0000ce;
            z-index: 1;
            position: absolute;
            top: 0;
            left: 0;
        }

        .additional-box {
            height: 80%;
            width: 25%;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            margin: 0 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .additional-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: opacity 0.3s ease;
            opacity: 0;
            /* Initial opacity set to 0 */
        }

        .additional-box:hover::before {
            opacity: 1;
            /* Change opacity on hover */
        }

        .additional-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .additional-box:hover img {
            transform: scale(1.1);
        }

        .additional-box button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #ff3b30;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            z-index: 2;
        }

        .additional-box button:hover {
            background-color: #73e600;
        }

        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        h1 {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            z-index: 2;
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>EXPLORE OUR COURSES</h1>

        <!-- Five additional boxes -->
        <div class="additional-box" style="background-image: url('./newone.jpg');">
            <img src="./newone.jpg" alt="Phase 1">
            <button>Phase 1</button>
        </div>
        <div class="additional-box" style="background-image: url('./OIG2.8JEj1AwXoPXo4ixOsa3s.jpg');">
            <img src="./OIG2.8JEj1AwXoPXo4ixOsa3s.jpg" alt="Phase 2">
            <button>Phase 2</button>
        </div>

        <div class="additional-box" style="background-image: url('./three.jpg');">
            <img src="./three.jpg" alt="Phase 3">
            <button>Phase 3</button>
        </div>

        <div class="additional-box" style="background-image: url('./fourth.jpg');">
            <img src="./fourth.jpg" alt="Phase 4">
            <button>Phase 4</button>
        </div>
        <div id="additional-box" class="additional-box" style="background-image: url('./fifth.jpg');">
            <img src="./fifth.jpg" alt="Phase 5">
            <button>Phase 5</button>
        </div>
        <!-- Your video element -->
        <video id="background-video" autoplay loop muted>
            <source src="./Vmake-1710150714315 (online-video-cutter.com).mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // Get the additional boxes container element
        const ba = document.querySelector('.main');

        // Add event listener for mousewheel scrolling
        additionalBoxes.addEventListener('wheel', function (event) {
            // Prevent the default scroll behavior
            event.preventDefault();

            // Calculate the amount to scroll
            const scrollAmount = event.deltaY;

            // Scroll the additional boxes container horizontally
            additionalBoxes.scrollLeft += scrollAmount;
        });
    </script>
</body>

</html>
