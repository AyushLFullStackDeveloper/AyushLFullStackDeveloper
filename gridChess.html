<!DOCTYPE html>

    <!-- styling -->
    <style>
        /* animation start */

        /* animation end */

        .bg {
            background-image: url(https://img.freepik.com/premium-photo/chess-pieces-chess-board-with-city-background_931576-19745.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .main,header {
            display: grid;
            background-color: aquamarine;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            height: 700px;
            width: 700px;
            border-style: solid;
            /*  */
            animation-name: myAnimation;
            animation-duration: 7s;
            animation-timing-function: 5s;
            animation-iteration-count: 3;
        }
        @keyframes myAnimation {
            0% {

                transform: translateX(-400px);
                color: yellow;
                font-size: 10px;
            }

            50% {

                color: red;
                font-size: 30px;
            }

            75% {
                color: rgb(11, 7, 6);
                font-size: 50px;
            }

            100% {

                color: blue;
                font-size: 80px;
            }
        }
        /*  */

        .white {
            background-color: white;
            text-align: center;
        }

        .black {
            background-color: rgb(5, 4, 4);
            text-align: center;
        }

        .header {
            margin-left: 250px;
            color: rgb(39, 12, 51);
        }
    </style>
</head>
