    <!-- styling -->
    <style>
        .main {
            display: grid;
            background-color: aqua;
            width: 100vh;
            height: 100vh;

        }

        /* top-ex */
        .top-ex {
            background-color: yellow;
            height: 30%;
            width: 100%;
            border-style: solid;

        }

        /* top */
        .top {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 10%;
            width: 100%;
            gap: 2px;
            border-style: solid;
        }

        /* one */
        .one {
            background-color: darkolivegreen;
            text-align: center;
            height: 100%;
            border-style: groove;
        }

        /* ayu */
        .ayu {
            background-color: rgb(63, 172, 8);
            height: 10%;
            width: 100%;
            border-style: solid;
        }

        /* ANU */
        .anu {
            text-align: center;
            font-size: xx-large;
            margin-top: 15px;
        }

        /*  */
        .top-most {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 50%;
            width: 100%;
            gap: 1px;
            border-style: solid;
        }

        /* two */
        .two {
            background-color: crimson;
            border-style: groove;

        }

        /* bt */
        .bt {
            margin-top: 10px;
            height: 45px;
            background-color: #ECB159;
        }

        /* bg */
        .new {
            margin-top: 10px;
            height: 45px;
            background-color: darksalmon;
        }

        /*  */
        .two {
            height: 150px;
            margin-top: 10px;
            text-align: center;
        }
