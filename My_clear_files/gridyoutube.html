<!DOCTYPE html>
<html>

<head>
    <style>
        .main-ele {
            display: grid;
            background-color: aquamarine;
            grid-template-columns: ;
            gap: 10px;
            height: 100vh;
            width: 100vw;
        }

        .first-ele {
            background-color: blue;
        }

        .second-ele {
            background-color: red;
            display: grid;
            grid-template-rows: 1fr;
            gap: 10px;
        }

        .inner {
            background-color: green;
        }
        .inner-2{
            background-color: rgb(185, 30, 105);
        }
    </style>
</head>

<body style="margin: 0px; padding: 0px;">
    <div class="main-ele">
        <div class="first-ele"></div>
        <div class="second-ele">
            <div class="inner"></div>
            <div class="inner-2"></div>
        </div>
    </div>
</body>

</html>
