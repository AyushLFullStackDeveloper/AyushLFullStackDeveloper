<!DOCTYPE html>
<html>

<head>
    <!-- styling -->
    <style>
        /* main */
        .main {
            width: 100vw;
            height: 100vw;
            background-color: rgb(121, 213, 231);
            display: flex;
            flex-direction: column;
        }

        /* row1 */
        .row1 {
            width: 100%;
            height: 50%;
            display: grid;
            flex-direction: row;
        }

        /* row 1 child */

        .left {
            background-color: blue;
            height: 100%;
            width: 100%;
            text-align: center;
        }

        .right {
            background-color: rgb(144, 144, 9);
            height: 100%;
            width: 60%;
           
        }

        /*  */
        .row2 {
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        /*  */
        .right-2 {
            background-color: rgb(252, 217, 23);
            height: 100%;
            width: 60%;
            
        }
        /*  */
        .row3 {
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        .right-3 {
            background-color: rgb(242, 115, 69);
            height: 100%;
            width: 60%;
            
        }
        .left-3 {
            background-color: rgb(132, 196, 48);
            height: 100%;
            width: 60%;
            
        }
        .row4{
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .right-4{

        }
        .left-4{

        }
    </style>
</head>

<body>
    <!-- main -->
    <main class="main">

        <!-- row 1 -->
        <div class="row1">
            <!-- left -->
            <div class="left">😖</div>
            <!-- right -->
        </div>
        <!-- 2 main -->
        <div class="row2">
            <div class="right"></div>
            <div class="right-2"></div>
        </div>
<!-- 3row -->
<div class="row3">
    <div class="right-3"></div>
    <div class="left-3"></div>
</div>
<!-- 4row -->
<div class="row4">
    <div class="right-4"></div>
    <div class="left-4"></div>
</div>

    </main>
</body>

</html>
