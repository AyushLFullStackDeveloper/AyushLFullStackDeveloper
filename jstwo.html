<!DOCTYPE html>
<html>

<head>
    <style>
        .main {
            width: 50vw;
            height: 50vw;
            background-color: lightpink;
        }

        /* display */
        #display {
            width: 100%;
            height: 100px;
            background-color: aliceblue;
            font-size: xx-large;
        }

        /*  */
        .submit {
            width: 100px;
            height: 60px;
            background-color: yellow;
        }
    </style>

    <script>
        function Add() {
            let firstNO = document.getElementById("number-one").value;
            let secondNo = document.getElementById("number-two").value;
            let total = Number(firstNO) + Number(secondNo);
            document.getElementById("display").innerHTML = "the result is: " + total;
        }
        function sub() {
            let firstNO = document.getElementById("number-one").value;
            let secondNo = document.getElementById("number-two").value;
            let total = Number(firstNO) - Number(secondNo);
            document.getElementById("display").innerHTML = "the result is: " + total;
        }
        function mul() {
            let firstNO = document.getElementById("number-one").value;
            let secondNo = document.getElementById("number-two").value;
            let total = Number(firstNO) * Number(secondNo);
            document.getElementById("display").innerHTML = "the result is: " + total;
        }

        function clearFunction() {
            document.getElementById("display").innerHTML = "";
        }

    </script>
</head>

<body>
    <div class="main">

        <h1 id="display"></h1>

        <input type="text" id="number-one" value="0" style="width: 250px; height: 50px;" value="0">
        <!--  -->
        <input type="text" id="number-two" value="0" style="width: 250px; height: 50px;" value="0">
        <!--  -->
        <div style="text-align: right;"> <button type="submit" class="submit" onclick="clearFunction()">CLEAR</button>
        </div>
        <br />
        <!--  -->
        <div style="text-align: right;"> <button type="submit" class="submit" onclick="Add()"><b>+</b></button></div>
        <br />
        <div style="text-align: right;"> <button type="submit" class="submit" onclick="sub()"><b>-</b></button></div>
        <br>
        <div style="text-align: right;"> <button type="submit" class="submit" onclick="mul()"><b>*</b></button></div>
    </div>
</body>

</html>
